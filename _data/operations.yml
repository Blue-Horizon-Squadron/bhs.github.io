- id: op-002
  codename: "OPERATION MASKED HYDRA"
  title: "Masked Hydra - Canyon Runs"
  theater: "Modern"
  map: "Caucasus"
  status: "upcoming"
  date: "2026-04-18"
  time: "18:00 ZULU"
  duration: "2–3 hours"
  difficulty: "Intermediate"
  slots_total: 20
  slots_filled: 0
  description: >
    Your task is to destroy a variety of targets that are generated randomly. 
    This mission is a low level mission flying through the canyons of Caucasus with routes that are randomised by threat level. 
    You MUST not exceed 200 AGL otherwise enemy SAM threats WILL engage you and your speed must be above 500 kts CAS.

    Each target will be beyond a mountainous ridge therefore you must pop up and hit the target, 
    if you miss the target enemy air forces will intercept you on your way out. 
    There will be heavy resistance. This is a one way mission, if you die... that's it.
  objectives:
    - "Maintain ≤ 200 ft AGL and ≥ 500 kts CAS while inside the corridor zones."
    - "Destroy the assigned target set inside the target zone"
    - "Intercept and defeat enemy strike aircraft"
    - "Protect friendlies"
  roles:
