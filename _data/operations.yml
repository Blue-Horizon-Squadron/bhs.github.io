      aircraft: "F/A-18C Hornet"
      slots: 4
      filled: 0
    - name: "CAS"
      aircraft: "F-14A/B Tomcat"
      slots: 4
      filled: 0
  patch_image: "/assets/images/masked_hydra.png"
