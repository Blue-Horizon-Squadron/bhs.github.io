---
layout: default
---

<div class="page-header">
  <div class="container">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page-header__subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </div>
</div>

<div class="container section">
  <div class="post-content">
    {{ content }}
  </div>
</div>
